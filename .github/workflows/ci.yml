# NOTE: this workflow is inert until flutter_virtual_tryon becomes its own
# GitHub repository (see doc/HANDOVER.md, "Structure & publishing
# decisions"). GitHub Actions only discovers workflows under a repo's own
# top-level `.github/workflows/` — while this package lives nested inside
# the KaloChasma monorepo, this file does nothing. It's written path-relative
# to what will be the future repo root so it needs no changes at split time.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test --coverage

  test-web:
    name: Test (web backend compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # The default VM test target selects io_backend.dart
      # (platform_backend.dart's conditional export); this is the only
      # lane that compiles media_pipe_backend.dart / web_bridge.dart's
      # dart:js_interop code against a real browser target.
      - run: flutter test --platform chrome test/web_smoke_test.dart

  publish-dry-run:
    name: pub publish --dry-run
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart pub publish --dry-run
